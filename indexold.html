<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tidal Playlist Organizer</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
					sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				padding: 20px;
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
			}

			.header {
				text-align: center;
				color: white;
				margin-bottom: 40px;
			}

			.header h1 {
				font-size: 2.5em;
				margin-bottom: 10px;
			}

			.header p {
				font-size: 1.2em;
				opacity: 0.9;
			}

			.card {
				background: white;
				border-radius: 12px;
				padding: 40px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
				margin-bottom: 20px;
			}

			/* Login View */
			#loginView {
				text-align: center;
			}

			#loginView h2 {
				margin-bottom: 20px;
				color: #333;
			}

			#loginView p {
				color: #666;
				margin-bottom: 30px;
				line-height: 1.6;
			}

			.btn {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				border: none;
				padding: 15px 40px;
				font-size: 1.1em;
				border-radius: 8px;
				cursor: pointer;
				transition:
					transform 0.2s,
					box-shadow 0.2s;
				font-weight: 600;
			}

			.btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
			}

			.btn:active {
				transform: translateY(0);
			}

			.btn-secondary {
				background: #f44336;
				margin-left: 10px;
			}

			.btn-secondary:hover {
				box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4);
			}

			/* Playlists View */
			#playlistsView {
				display: none;
			}

			.user-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 30px;
				padding-bottom: 20px;
				border-bottom: 2px solid #eee;
			}

			.user-info h2 {
				color: #333;
				margin-bottom: 5px;
			}

			.user-info p {
				color: #666;
				font-size: 0.9em;
			}

			/* Loading Spinner */
			.spinner {
				display: inline-block;
				width: 40px;
				height: 40px;
				border: 4px solid rgba(102, 126, 234, 0.3);
				border-radius: 50%;
				border-top-color: #667eea;
				animation: spin 0.8s linear infinite;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			.loading {
				text-align: center;
				padding: 40px;
				color: #666;
			}

			/* Playlists Grid */
			.playlists-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
				gap: 20px;
				margin-top: 20px;
			}

			.playlist-card {
				background: white;
				border-radius: 12px;
				overflow: hidden;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
				transition:
					transform 0.2s,
					box-shadow 0.2s;
				cursor: pointer;
			}

			.playlist-card:hover {
				transform: translateY(-4px);
				box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
			}

			.playlist-cover {
				width: 100%;
				height: 250px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				display: flex;
				align-items: center;
				justify-content: center;
				color: white;
				font-size: 3em;
				font-weight: bold;
			}

			.playlist-cover img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.playlist-info {
				padding: 15px;
			}

			.playlist-name {
				font-size: 1.1em;
				font-weight: 600;
				color: #333;
				margin-bottom: 8px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.playlist-meta {
				font-size: 0.9em;
				color: #666;
				display: flex;
				justify-content: space-between;
				margin-bottom: 5px;
			}

			.playlist-date {
				font-size: 0.85em;
				color: #999;
			}

			/* Error Messages */
			.error {
				background: #ffebee;
				color: #c62828;
				padding: 15px;
				border-radius: 8px;
				margin-bottom: 20px;
				border-left: 4px solid #c62828;
			}

			.info-link {
				color: #667eea;
				text-decoration: none;
				font-weight: 600;
			}

			.info-link:hover {
				text-decoration: underline;
			}

			.empty-state {
				text-align: center;
				padding: 60px 20px;
				color: #666;
			}

			.empty-state h3 {
				margin-bottom: 10px;
				color: #333;
			}

			/* Responsive */
			@media (max-width: 768px) {
				.header h1 {
					font-size: 2em;
				}

				.card {
					padding: 20px;
				}

				.user-header {
					flex-direction: column;
					gap: 15px;
					text-align: center;
				}

				.playlists-grid {
					grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
					gap: 15px;
				}

				.playlist-cover {
					height: 150px;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="header">
				<h1>🎵 Tidal Playlist Organizer</h1>
				<p>View and manage your Tidal playlists</p>
			</div>

			<!-- Login View -->
			<div id="loginView" class="card">
				<h2>Welcome!</h2>
				<p>
					Connect your Tidal account to view and organize your playlists.<br />
					You'll need a Tidal account and API credentials from the
					<a href="https://developer.tidal.com" target="_blank" class="info-link"
						>Tidal Developer Portal</a
					>.
				</p>
				<button id="loginBtn" class="btn">Login with Tidal</button>
				<div id="loginError" style="margin-top: 20px"></div>
			</div>

			<!-- Playlists View -->
			<div id="playlistsView">
				<div class="card">
					<div class="user-header">
						<div class="user-info">
							<h2>Your Playlists</h2>
							<p id="userIdDisplay"></p>
						</div>
						<div>
							<button id="logoutBtn" class="btn btn-secondary">Logout</button>
						</div>
					</div>

					<div id="loadingIndicator" class="loading">
						<div class="spinner"></div>
						<p style="margin-top: 15px">Loading your playlists...</p>
					</div>

					<div id="playlistsError"></div>
					<div id="playlistsContainer" class="playlists-grid"></div>
				</div>
			</div>
		</div>

		<script type="module">
			import {
				init,
				initializeLogin,
				finalizeLogin,
				credentialsProvider,
				logout
			} from '@tidal-music/auth';
			import { createAPIClient } from '@tidal-music/api';

			// Configuration
			const config = {
				clientId: import.meta.env.VITE_TIDAL_CLIENT_ID,
				redirectUri: import.meta.env.VITE_TIDAL_REDIRECT_URI || window.location.origin,
				countryCode: import.meta.env.VITE_COUNTRY_CODE || 'NO', // Defaults to Norway (Tidal's home!)
				credentialsStorageKey: 'tidalPlaylistOrganizer'
			};

			// DOM Elements
			const loginView = document.getElementById('loginView');
			const playlistsView = document.getElementById('playlistsView');
			const loginBtn = document.getElementById('loginBtn');
			const logoutBtn = document.getElementById('logoutBtn');
			const loginError = document.getElementById('loginError');
			const loadingIndicator = document.getElementById('loadingIndicator');
			const playlistsContainer = document.getElementById('playlistsContainer');
			const playlistsError = document.getElementById('playlistsError');
			const userIdDisplay = document.getElementById('userIdDisplay');

			// Helper: Decode JWT to extract user ID
			function decodeJWT(token) {
				try {
					const parts = token.split('.');
					if (parts.length !== 3) return null;
					const payload = JSON.parse(atob(parts[1]));
					return payload;
				} catch (error) {
					console.error('Failed to decode JWT:', error);
					return null;
				}
			}

			// Helper: Format date
			function formatDate(dateString) {
				const date = new Date(dateString);
				return date.toLocaleDateString('en-US', {
					year: 'numeric',
					month: 'short',
					day: 'numeric'
				});
			}

			// Helper: Get playlist cover art URL
			function getCoverArtUrl(playlist, included) {
				if (!playlist.relationships?.coverArt?.data?.[0]?.id) {
					return null;
				}

				const coverArtId = playlist.relationships.coverArt.data[0].id;
				const coverArt = included?.find(
					(item) => item.type === 'artworks' && item.id === coverArtId
				);

				if (coverArt?.attributes?.files) {
					// Find a suitable size (prefer 320x320 or similar)
					const file =
						coverArt.attributes.files.find((f) => f.meta?.width >= 250 && f.meta?.width <= 500) ||
						coverArt.attributes.files[0];

					return file?.href;
				}

				return null;
			}

			// Display error message
			function showError(container, message) {
				container.innerHTML = `<div class="error">${message}</div>`;
			}

			// Clear error message
			function clearError(container) {
				container.innerHTML = '';
			}

			// Render playlists
			function renderPlaylists(playlists, included) {
				if (playlists.length === 0) {
					playlistsContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>No playlists found</h3>
                        <p>Create some playlists in Tidal to see them here!</p>
                    </div>
                `;
					return;
				}

				playlistsContainer.innerHTML = playlists
					.map((playlist) => {
						const attrs = playlist.attributes;
						console.log(`playlist: ${JSON.stringify(playlist)}`);
						const coverUrl = getCoverArtUrl(playlist, included);
						const trackCount = attrs.numberOfItems || 0;
						const lastModified = attrs.lastModifiedAt
							? formatDate(attrs.lastModifiedAt)
							: 'Unknown';
						const tidalUrl = attrs.externalLinks?.[0]?.href || attrs.url || '#';

						return `
                    <a href="${tidalUrl}" target="_blank" class="playlist-card" style="text-decoration: none;">
                        <div class="playlist-cover">
                            ${
															coverUrl
																? `<img src="${coverUrl}" alt="${attrs.name}">`
																: `<span>♪</span>`
														}
                        </div>
                        <div class="playlist-info">
                            <div class="playlist-name" title="${attrs.name}">${attrs.name}</div>
                            <div class="playlist-meta">
                                <span>🎵 ${trackCount} tracks</span>
                            </div>
                            <div class="playlist-date">Updated: ${lastModified}</div>
                        </div>
                    </a>
                `;
					})
					.join('');
			}

			// Fetch and display playlists
			async function loadPlaylists() {
				try {
					clearError(playlistsError);
					loadingIndicator.style.display = 'block';
					playlistsContainer.innerHTML = '';

					// Get credentials and extract user ID
					const credentials = await credentialsProvider.getCredentials();
					const tokenData = decodeJWT(credentials.token);

					if (!tokenData?.uid) {
						throw new Error('Could not extract user ID from token');
					}

					const userId = tokenData.uid.toString();
					userIdDisplay.textContent = `User ID: ${userId}`;

					// Create API client
					const apiClient = createAPIClient(credentialsProvider);

					// Fetch playlists
					const { data, error } = await apiClient.GET('/playlists', {
						params: {
							query: {
								'filter[owners.id]': [userId],
								include: ['coverArt', 'owners'],
								countryCode: config.countryCode,
								sort: ['-lastModifiedAt']
							}
						}
					});

					loadingIndicator.style.display = 'none';

					if (error) {
						console.error('API Error:', error);
						const errorMsg =
							error.errors?.map((e) => e.detail).join(', ') || 'Failed to load playlists';
						showError(playlistsError, errorMsg);
						return;
					}

					if (!data?.data) {
						showError(playlistsError, 'No data returned from API');
						return;
					}

					renderPlaylists(data.data, data.included);
				} catch (error) {
					console.error('Error loading playlists:', error);
					loadingIndicator.style.display = 'none';
					showError(playlistsError, `Error: ${error.message}`);
				}
			}

			// Login handler
			loginBtn.addEventListener('click', async () => {
				try {
					clearError(loginError);
					loginBtn.disabled = true;
					loginBtn.textContent = 'Connecting...';

					if (!config.clientId) {
						throw new Error(
							'Client ID not configured. Please set VITE_TIDAL_CLIENT_ID in your .env file.'
						);
					}

					// Store config for after redirect
					localStorage.setItem('tidalConfig', JSON.stringify(config));

					// Initialize auth
					await init({
						clientId: config.clientId,
						credentialsStorageKey: config.credentialsStorageKey,
						scopes: ['playlists.read', 'user.read']
					});

					// Get login URL and redirect
					const loginUrl = await initializeLogin({
						redirectUri: config.redirectUri
					});

					window.location.href = loginUrl;
				} catch (error) {
					console.error('Login error:', error);
					showError(loginError, `Login failed: ${error.message}`);
					loginBtn.disabled = false;
					loginBtn.textContent = 'Login with Tidal';
				}
			});

			// Logout handler
			logoutBtn.addEventListener('click', async () => {
				try {
					await logout();
					localStorage.removeItem('tidalConfig');
					window.location.reload();
				} catch (error) {
					console.error('Logout error:', error);
					alert('Failed to logout. Please try again.');
				}
			});

			// Initialize app on page load
			async function initApp() {
				try {
					const urlParams = new URLSearchParams(window.location.search);
					const storedConfig = localStorage.getItem('tidalConfig');

					if (storedConfig) {
						Object.assign(config, JSON.parse(storedConfig));
					}

					// Check if returning from OAuth redirect
					if (urlParams.has('code') || urlParams.has('error')) {
						if (urlParams.has('error')) {
							const errorMsg = urlParams.get('error_description') || urlParams.get('error');
							showError(loginError, `Authentication failed: ${errorMsg}`);
							window.history.replaceState({}, document.title, window.location.pathname);
							return;
						}

						// Initialize auth with stored config
						await init({
							clientId: config.clientId,
							credentialsStorageKey: config.credentialsStorageKey
						});

						// Finalize login
						await finalizeLogin(window.location.search);

						// Clean up URL
						window.history.replaceState({}, document.title, window.location.pathname);

						// Show playlists view
						loginView.style.display = 'none';
						playlistsView.style.display = 'block';

						// Load playlists
						await loadPlaylists();
						return;
					}

					// Check if already logged in
					if (config.clientId) {
						await init({
							clientId: config.clientId,
							credentialsStorageKey: config.credentialsStorageKey
						});

						try {
							const credentials = await credentialsProvider.getCredentials();
							if (credentials?.token) {
								// Already authenticated
								loginView.style.display = 'none';
								playlistsView.style.display = 'block';
								await loadPlaylists();
								return;
							}
						} catch (error) {
							// Not authenticated, show login
							console.log('No valid credentials found');
						}
					}

					// Show login view
					loginView.style.display = 'block';
					playlistsView.style.display = 'none';
				} catch (error) {
					console.error('Initialization error:', error);
					showError(loginError, `Initialization failed: ${error.message}`);
					loginView.style.display = 'block';
					playlistsView.style.display = 'none';
				}
			}

			// Start the app
			initApp();
		</script>
	</body>
</html>
